# Alembic configuration for AI Gateway Pro.
# The database URL is injected at runtime from application settings
# (see alembic/env.py), so it is intentionally left blank here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Use a timestamp + slug naming scheme for migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url =

[post_write_hooks]
# (optional) hooks such as black/ruff can be configured here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
